    <meta property="og:type" content="website" />

      property="og:description"

    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="INCE" />

      name="twitter:description"
      content="INCE（インセ）は、親子で学習成果を申請・承認し、おこづかい管理につなげるスマホ向けアプリです。"
    />

    <link rel="icon" type="image/svg+xml" href="./icon.svg?v=phase215" />
    <link rel="apple-touch-icon" href="./icon.svg?v=phase215" />
    <link rel="manifest" href="./manifest.webmanifest?v=phase215" />
    <link rel="stylesheet" href="./styles.css?v=phase215" />
  </head>
  <body>
    <div class="phone-shell">
      <main id="app" class="app" aria-live="polite"></main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js?v=phase215"></script>
    <script src="./app.js?v=phase215"></script>
    <script src="./cloud.js?v=phase215"></script>
    <script src="./monthly-bonus.js?v=phase215"></script>
    <script src="./lucide-icons.js?v=phase215"></script>
    <script src="./child-design.js?v=phase215"></script>
    <script src="./child-design-fix.js?v=phase215"></script>
    <script src="./child-plus-fix.js?v=phase215"></script>
    <style>
      .child-apply-design {
        padding-bottom: 32px !important;
      }
    </style>
    <script>
      (() => {
        const removeApplyNav = () => {
          const route = location.hash.replace("#", "") || "/";
          if (!route.startsWith("/child/apply") && !route.startsWith("/child/reapply")) {
            return;
          }
          document
            .querySelector('#app nav[aria-label="こどもメニュー"], #app .bottom-nav, #app .child-design-nav')
            ?.remove();
        };
        const scheduleRemoveApplyNav = () => {
          window.setTimeout(removeApplyNav, 0);
          window.setTimeout(removeApplyNav, 300);
          window.setTimeout(removeApplyNav, 900);
        };

        window.addEventListener("hashchange", scheduleRemoveApplyNav);
        window.addEventListener("ince:child-rendered", scheduleRemoveApplyNav);
        const app = document.querySelector("#app");
        if (app) {
          new MutationObserver(removeApplyNav).observe(app, { childList: true, subtree: true });
        }
        scheduleRemoveApplyNav();
      })();
    </script>
  </body>
</html>
